<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — House of Calvary †</title>
  <meta name="description" content="Explore the work of House of Calvary tattoo studio, Singapore.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 52px;
    }

    .photo-grid-item {
      aspect-ratio: 3 / 4;
      overflow: hidden;
      display: block;
    }

    .photo-grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: transform 0.4s ease, filter 0.4s ease;
      filter: brightness(0.92);
    }

    .photo-grid-item:hover img {
      transform: scale(1.05);
      filter: brightness(1);
    }

    @media (max-width: 960px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 4px; }
    }
  </style>
</head>
<body>

<main>

  <div class="page-hero">
    <div class="eyebrow">Our Work</div>
    <h1>Portfolio</h1>
    <p>A collection of work from our studio</p>
  </div>

  <section>
    <div class="photo-grid">
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 1.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 2.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 3.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 4.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 5.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 6.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 7.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 8.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 9.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
      <div class="photo-grid-item">
        <img src="assets/portfolio/img 10.jpg" alt="House of Calvary tattoo work" loading="lazy">
      </div>
    </div>

    <div style="text-align:center; margin-top:60px; padding-top:60px; border-top:1px solid var(--border);">
      <p style="color:var(--text-muted); font-size:13px; margin-bottom:20px; letter-spacing:0.05em;">See more on our Instagram</p>
      <a href="https://www.instagram.com/houseofcalvary/" target="_blank" rel="noopener" class="btn btn-outline-gold">@houseofcalvary</a>
    </div>
  </section>

</main>

<script src="js/main.js"></script>
</body>
</html>
